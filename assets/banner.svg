<svg width="100%" height="250" viewBox="0 0 1200 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>
    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0" />
      <stop offset="50%" stop-color="#00E5FF" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#111111" stroke-width="1" />
    </pattern>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 800; font-size: 64px; fill: #FFFFFF; letter-spacing: 4px; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 400; font-size: 18px; fill: #888888; letter-spacing: 4px; }
      .accent { fill: #00E5FF; }
      @keyframes pulse {
        0% { opacity: 0.2; }
        50% { opacity: 1; }
        100% { opacity: 0.2; }
      }
      .dot { animation: pulse 3s infinite ease-in-out; }
    </style>
  </defs>
  
  <rect width="1200" height="250" fill="url(#bg-grad)" />
  <rect width="1200" height="250" fill="url(#grid)" />
  
  <rect width="1200" height="2" y="248" fill="url(#cyan-glow)" />
  
  <text x="600" y="125" text-anchor="middle" class="title">TOSIF KURESHI<tspan class="accent">.</tspan></text>
  <text x="600" y="170" text-anchor="middle" class="subtitle">SOFTWARE ENGINEER <tspan fill="#333333">|</tspan> ARCHITECT <tspan fill="#333333">|</tspan> CREATOR</text>
  
  <circle cx="600" cy="195" r="3" fill="#00E5FF" class="dot" />
</svg>
